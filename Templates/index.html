<!DOCTYPE html>
<html>
<head>
    <title>Guess Number Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

    <h1 class="mb-4">🎯 Guess the Number</h1>

    <div class="card p-4 shadow">

        <h4 class="text-primary">{{ message }}</h4>

        <form method="POST">
            <input type="number" name="guess" class="form-control mb-3" placeholder="Enter number" required>
            <button type="submit" class="btn btn-success">Check</button>
        </form>

        <h5 class="mt-3">Score: {{ score }}</h5>

        <a href="/reset" class="btn btn-danger mt-3">Reset Game</a>

    </div>

</div>

</body>
</html>
